services:
  # 🎨 颜值担当：前端静态页面 (Nginx 代理)
  frontend:
    image: nginx:alpine
    container_name: library_frontend
    ports:
      - "8880:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html  # 殿下编译好的 Vue/React 静态文件放这里
      - ./nginx.conf:/etc/nginx/nginx.conf     # Nginx 配置文件
    restart: unless-stopped
    depends_on:
      - backend

  # 🧠 幕后大脑：FastAPI 后端
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: library_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data  # SQLite 数据库和你的原始书库都存在这里哦
    environment:
      - TTS_API_URL=http://tts:10200
      - TZ=Asia/Shanghai
    restart: unless-stopped
    depends_on:
      - tts

  # 🏭 格式转换大锅炉：Calibre (通过 LinuxServer 镜像提供 Web 服务和转换引擎)
  calibre:
    image: lscr.io/linuxserver/calibre:latest
    container_name: library_calibre
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
    volumes:
      - ./data/calibre_config:/config
      - ./data/books:/books  # 和后端共享书库目录，方便互相串门！
    ports:
      - "8081:8080"          # Calibre 自己的 Web 界面（平时不用可以关掉端口映射）
    restart: unless-stopped

  # 🗣️ 赛博播音员：Piper 本地 TTS
  tts:
    image: rhasspy/wyoming-piper
    container_name: library_tts
    ports:
      - "10200:10200"
    volumes:
      - ./data/piper_data:/data  # 用来存放下载的语音模型
    # 这里举个栗子，使用了一个中文女声中等精度的模型，殿下可以随时换！
    command: [
      "--voice", "zh_CN-huayan-medium" 
    ]
    restart: unless-stopped
