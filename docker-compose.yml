services:
  # 🎨 颜值担当：前端静态页面 (Nginx 代理)
  frontend:
    image: nginx:alpine
    container_name: library_frontend
    ports:
      - "8443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html  # 殿下编译好的 Vue/React 静态文件放这里
      - ./data:/app/data
      - ./nginx.conf:/etc/nginx/nginx.conf     # Nginx 配置文件
      - ./certs:/etc/nginx/certs:ro
    restart: unless-stopped
    depends_on:
      - backend

  # 🧠 幕后大脑：FastAPI 后端
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: library_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data  # SQLite 数据库和你的原始书库都存在这里哦
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TTS_API_URL=http://tts:10200
      - TZ=Asia/Shanghai
    restart: unless-stopped
    depends_on:
      - tts

  # 🗣️ 赛博播音员：Piper 本地 TTS
  tts:
    image: rhasspy/wyoming-piper
    container_name: library_tts
    ports:
      - "10200:10200"
    volumes:
      - ./data/piper_data:/data  # 用来存放下载的语音模型
    # 这里举个栗子，使用了一个中文女声中等精度的模型，殿下可以随时换！
    command: [
      "--voice", "zh_CN-huayan-medium" 
    ]
    restart: unless-stopped