# 跑在 Alpine 里的精简 Nginx
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # 开启 Gzip 压缩，让殿下的黑白 UI 加载速度突破天际！🚀
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        # 1. 开启 HTTP/2 (如果你的 nginx 版本太老不支持 http2 关键字，就用 listen 443 ssl http2;)
        listen       443 ssl;
        http2        on; 
        server_name  node1.sudorm.su; 
        
        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # 🎨 前端静态资源路由
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html; 
        }

        # 2. 拦截 robots.txt，找不到就直接报 404，不让它走到 index.html
        location = /robots.txt {
            root /usr/share/nginx/html;
            try_files $uri =404;
            access_log off;
            log_not_found off;
        }

        # 3. 针对 Vite 打包生成的静态资源，开启极致强缓存 (文件名带 hash，可以直接缓存 1 年)
        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }
        
        location /api/static/ {
            alias /app/data/; 
            sendfile on;
            tcp_nopush on;
            add_header Accept-Ranges bytes; 
            expires 30d; 
            add_header Cache-Control "public, no-transform";
            add_header Access-Control-Allow-Origin *;
        }

        # 🧠 后端 API 反向代理 (保持你原有的优秀配置)
        location /api/ {
            proxy_pass http://backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 100M; 
            proxy_buffering off;       
            proxy_read_timeout 300s;   
        }
    }
}
